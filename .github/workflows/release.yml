name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.version=${RELEASE_VERSION} -X main.commit=${COMMIT_SHA} -X main.date=${date}"

          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "${ldflags}" -o kb-darwin-arm64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "${ldflags}" -o kb-darwin-amd64 .
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags "${ldflags}" -o kb-linux-amd64  .

      - name: Generate checksums
        run: sha256sum kb-darwin-arm64 kb-darwin-amd64 kb-linux-amd64 > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_VERSION" \
            --generate-notes \
            kb-darwin-arm64 \
            kb-darwin-amd64 \
            kb-linux-amd64 \
            checksums.txt
